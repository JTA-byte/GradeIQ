# Render Blueprint for the GradeIQ Python data jobs.
# Deploy: connect this repo in the Render dashboard -> "New Blueprint
# Instance" -> it will detect this file and create both cron jobs below.
#
# NOTE: `rootDir: python-services` already scopes buildCommand/startCommand
# to run with python-services/ as the working directory -- do not prefix
# them with `cd python-services &&`, that would try to enter a
# python-services/python-services directory that doesn't exist.
#
# NOTE: `playwright install --with-deps chromium` (not plain
# `playwright install chromium`) -- the `--with-deps` flag also installs
# the OS-level shared libraries (libnss3, libatk, etc.) Chromium needs to
# run headless, which a bare Python environment doesn't have. Without it,
# the browser binary installs fine but crashes on launch.
services:
  - type: cron
    name: nightly-pop-scrape
    runtime: python
    rootDir: python-services
    schedule: "0 3 * * *"
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: python -m jobs.nightly_pop_scrape
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: cron
    name: nightly-price-scrape
    runtime: python
    rootDir: python-services
    schedule: "0 4 * * *"
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: python -m jobs.nightly_price_scrape
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
